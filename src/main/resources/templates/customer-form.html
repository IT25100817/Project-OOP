<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head(${profileMode} ? 'My Profile' : 'Edit Customer')}"></head>
<body>
<div th:replace="~{fragments :: navbar}"></div>
<div th:replace="~{fragments :: alerts}"></div>

<div class="container py-4">
    <h1 class="h4 mb-3" th:text="${profileMode} ? 'Update Profile' : 'Edit Customer'">Update</h1>

    <form th:action="${profileMode} ? @{/customers/profile/update} : @{/customers/admin/update}" method="post" th:object="${customerForm}">
        <input type="hidden" th:field="*{id}">
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Username</label>
                <input class="form-control" th:field="*{username}" readonly>
            </div>
            <div class="col-md-6" th:if="${!profileMode}">
                <label class="form-label">Password</label>
                <input type="text" class="form-control" th:field="*{password}">
            </div>
            <div class="col-md-6" th:if="${profileMode}">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" th:field="*{password}" placeholder="Leave blank to keep existing password">
            </div>
            <div class="col-md-6">
                <label class="form-label">Full Name</label>
                <input class="form-control" th:field="*{fullName}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" th:field="*{email}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Phone</label>
                <input class="form-control" th:field="*{phone}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Customer Type</label>
                <select class="form-select" th:field="*{customerType}">
                    <option value="REGULAR">Regular</option>
                    <option value="PREMIUM">Premium</option>
                </select>
            </div>
            <div class="col-12">
                <label class="form-label">Address</label>
                <textarea class="form-control" rows="2" th:field="*{address}" required></textarea>
            </div>
        </div>
        <div class="mt-4 d-flex gap-2">
            <button class="btn btn-success" type="submit">Save Changes</button>
            <a class="btn btn-outline-secondary" th:href="${profileMode} ? @{/dashboard} : @{/customers}">Cancel</a>
        </div>
    </form>
</div>

<div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
