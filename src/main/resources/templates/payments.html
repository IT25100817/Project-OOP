<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Payments')}"></head>
<body>
<div th:replace="~{fragments :: navbar}"></div>
<div th:replace="~{fragments :: alerts}"></div>

<div class="container py-4">
    <h1 class="h4 mb-3">Payment History</h1>

    <div class="table-responsive">
        <table class="table table-striped align-middle">
            <thead class="table-light">
            <tr>
                <th>ID</th>
                <th>Order ID</th>
                <th>Type</th>
                <th>Amount</th>
                <th>Status</th>
                <th>Reference</th>
                <th>Date</th>
                <th th:if="${session.role == 'ADMIN'}">Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${payments}">
                <td th:text="${p.id}"></td>
                <td th:text="${p.orderId}"></td>
                <td th:text="${p.paymentType}"></td>
                <td>Rs. <span th:text="${#numbers.formatDecimal(p.amount,1,2)}"></span></td>
                <td><span class="badge bg-secondary" th:text="${p.status}"></span></td>
                <td th:text="${p.reference}"></td>
                <td th:text="${#temporals.format(p.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                <td th:if="${session.role == 'ADMIN'}">
                    <form class="d-flex gap-1" method="post" th:action="@{'/payments/update/' + ${p.id}}">
                        <select class="form-select form-select-sm" name="status">
                            <option value="PENDING">PENDING</option>
                            <option value="CONFIRMED">CONFIRMED</option>
                            <option value="REFUNDED">REFUNDED</option>
                            <option value="CANCELLED">CANCELLED</option>
                        </select>
                        <button class="btn btn-sm btn-outline-success">Update</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(payments)}"><td colspan="8" class="text-center text-muted">No payment records</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
