<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Checkout')}"></head>
<body>
<div th:replace="~{fragments :: navbar}"></div>
<div th:replace="~{fragments :: alerts}"></div>

<div class="container py-4">
    <h1 class="h4 mb-3">Checkout</h1>

    <div class="row g-4">
        <div class="col-lg-7">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h5 class="fw-bold mb-3">Order Details</h5>
                    <table class="table table-sm">
                        <thead><tr><th>Product</th><th>Qty</th><th>Line Total</th></tr></thead>
                        <tbody>
                        <tr th:each="item : ${summary.items}">
                            <td th:text="${item.productName}"></td>
                            <td th:text="${item.quantity}"></td>
                            <td>Rs. <span th:text="${#numbers.formatDecimal(item.lineTotal,1,2)}"></span></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-lg-5">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h5 class="fw-bold mb-3">Payment & Delivery</h5>
                    <form th:action="@{/orders/place}" method="post" th:object="${orderForm}">
                        <div class="mb-3">
                            <label class="form-label">Delivery Type</label>
                            <select class="form-select" th:field="*{orderType}">
                                <option value="STANDARD">Standard</option>
                                <option value="EXPRESS">Express</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Payment Type</label>
                            <select class="form-select" th:field="*{paymentType}" id="paymentTypeSelect">
                                <option value="COD">Cash on Delivery</option>
                                <option value="ONLINE">Online Payment</option>
                            </select>
                        </div>
                        <div class="mb-3" id="paymentReferenceWrapper">
                            <label class="form-label">Online Payment Reference</label>
                            <input class="form-control" th:field="*{paymentReference}" placeholder="TXN-12345">
                        </div>

                        <div class="summary-box p-3 rounded-3 mb-3">
                            <div class="d-flex justify-content-between"><span>Subtotal</span><span>Rs. <span th:text="${#numbers.formatDecimal(summary.subtotal,1,2)}"></span></span></div>
                            <div class="d-flex justify-content-between"><span>Discount</span><span>-Rs. <span th:text="${#numbers.formatDecimal(summary.discount,1,2)}"></span></span></div>
                            <div class="d-flex justify-content-between"><span>Delivery Fee</span><span>Rs. <span th:text="${#numbers.formatDecimal(summary.deliveryFee,1,2)}"></span></span></div>
                            <hr>
                            <div class="d-flex justify-content-between fw-bold"><span>Total</span><span>Rs. <span th:text="${#numbers.formatDecimal(summary.total,1,2)}"></span></span></div>
                        </div>

                        <button class="btn btn-success w-100">Place Order</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
