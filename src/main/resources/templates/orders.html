<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Orders')}"></head>
<body>
<div th:replace="~{fragments :: navbar}"></div>
<div th:replace="~{fragments :: alerts}"></div>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <h1 class="h4 mb-0">Order History</h1>
        <form class="d-flex gap-2" method="get" th:action="@{/orders/track}">
            <input class="form-control" name="orderId" placeholder="Track by Order ID">
            <button class="btn btn-outline-primary">Track</button>
        </form>
    </div>

    <form class="row g-2 mb-3" method="get" th:action="@{/orders}">
        <div class="col-md-3 col-lg-2">
            <select class="form-select" name="status">
                <option value="" th:selected="${status == ''}">All Status</option>
                <option value="PENDING" th:selected="${status == 'PENDING'}">PENDING</option>
                <option value="CONFIRMED" th:selected="${status == 'CONFIRMED'}">CONFIRMED</option>
                <option value="DELIVERED" th:selected="${status == 'DELIVERED'}">DELIVERED</option>
                <option value="CANCELLED" th:selected="${status == 'CANCELLED'}">CANCELLED</option>
            </select>
        </div>
        <div class="col-md-3 col-lg-2">
            <select class="form-select" name="sortBy">
                <option value="dateDesc" th:selected="${sortBy == 'dateDesc'}">Date New-Old</option>
                <option value="dateAsc" th:selected="${sortBy == 'dateAsc'}">Date Old-New</option>
                <option value="totalHigh" th:selected="${sortBy == 'totalHigh'}">Total High-Low</option>
                <option value="totalLow" th:selected="${sortBy == 'totalLow'}">Total Low-High</option>
                <option value="status" th:selected="${sortBy == 'status'}">Status A-Z</option>
            </select>
        </div>
        <div class="col-md-3 col-lg-2">
            <select class="form-select" name="size">
                <option value="5" th:selected="${size == 5}">5 / page</option>
                <option value="8" th:selected="${size == 8}">8 / page</option>
                <option value="12" th:selected="${size == 12}">12 / page</option>
            </select>
        </div>
        <div class="col-md-3 col-lg-2 d-grid">
            <button class="btn btn-success">Apply</button>
        </div>
    </form>

    <p class="small text-muted">Showing <span th:text="${#lists.size(orders)}">0</span> of <span th:text="${totalItems}">0</span> orders</p>

    <div class="table-responsive">
        <table class="table table-striped align-middle">
            <thead class="table-light">
            <tr>
                <th>ID</th>
                <th>Customer</th>
                <th>Type</th>
                <th>Status</th>
                <th>Total</th>
                <th>Date</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="order : ${orders}">
                <td th:text="${order.id}"></td>
                <td th:text="${order.customerName}"></td>
                <td th:text="${order.orderType}"></td>
                <td>
                    <span class="badge"
                          th:classappend="${order.status.name() == 'DELIVERED'} ? ' text-bg-success' : (${order.status.name() == 'CONFIRMED'} ? ' text-bg-primary' : (${order.status.name() == 'CANCELLED'} ? ' text-bg-danger' : ' text-bg-warning'))"
                          th:text="${order.status}"></span>
                </td>
                <td>Rs. <span th:text="${#numbers.formatDecimal(order.total,1,2)}"></span></td>
                <td th:text="${#temporals.format(order.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                <td class="d-flex flex-wrap gap-1">
                    <a class="btn btn-sm btn-outline-primary" th:href="@{'/orders/' + ${order.id}}">View</a>

                    <form th:if="${session.role == 'ADMIN'}" method="post" th:action="@{'/orders/status/' + ${order.id}}" class="d-flex gap-1">
                        <select class="form-select form-select-sm" name="status">
                            <option value="PENDING" th:selected="${order.status.name() == 'PENDING'}">PENDING</option>
                            <option value="CONFIRMED" th:selected="${order.status.name() == 'CONFIRMED'}">CONFIRMED</option>
                            <option value="DELIVERED" th:selected="${order.status.name() == 'DELIVERED'}">DELIVERED</option>
                            <option value="CANCELLED" th:selected="${order.status.name() == 'CANCELLED'}">CANCELLED</option>
                        </select>
                        <button class="btn btn-sm btn-outline-success">Update</button>
                    </form>

                    <form th:if="${session.role == 'CUSTOMER' and order.canCancel()}" method="post" th:action="@{'/orders/cancel/' + ${order.id}}">
                        <button class="btn btn-sm btn-outline-danger">Cancel</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(orders)}"><td colspan="7" class="text-center text-muted">No orders found</td></tr>
            </tbody>
        </table>
    </div>

    <nav th:if="${totalPages > 1}" aria-label="Orders pages">
        <ul class="pagination justify-content-center flex-wrap">
            <li class="page-item" th:classappend="${currentPage == 1} ? ' disabled'">
                <a class="page-link" th:href="@{/orders(page=${currentPage - 1},status=${status},sortBy=${sortBy},size=${size})}">Previous</a>
            </li>
            <li class="page-item" th:each="pageNo : ${#numbers.sequence(1, totalPages)}" th:classappend="${pageNo == currentPage} ? ' active'">
                <a class="page-link" th:text="${pageNo}" th:href="@{/orders(page=${pageNo},status=${status},sortBy=${sortBy},size=${size})}"></a>
            </li>
            <li class="page-item" th:classappend="${currentPage == totalPages} ? ' disabled'">
                <a class="page-link" th:href="@{/orders(page=${currentPage + 1},status=${status},sortBy=${sortBy},size=${size})}">Next</a>
            </li>
        </ul>
    </nav>
</div>

<div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
