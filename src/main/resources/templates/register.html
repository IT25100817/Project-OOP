<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Register')}"></head>
<body>
<div th:replace="~{fragments :: navbar}"></div>
<div th:replace="~{fragments :: alerts}"></div>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8 fade-in-up">
            <div class="card p-2">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <h1 class="h3 fw-bold mb-1">Customer Registration</h1>
                        <p class="text-muted small">Create an account to start shopping.</p>
                    </div>
                    <form th:action="@{/register}" method="post" th:object="${customerForm}">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Username</label>
                                <input class="form-control" th:field="*{username}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Password (min 6 chars)</label>
                                <input type="password" class="form-control" th:field="*{password}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Full Name</label>
                                <input class="form-control" th:field="*{fullName}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" th:field="*{email}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Phone</label>
                                <input class="form-control" th:field="*{phone}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Customer Type</label>
                                <select class="form-select" th:field="*{customerType}">
                                    <option value="REGULAR">Regular</option>
                                    <option value="PREMIUM">Premium</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Address</label>
                                <textarea class="form-control" rows="2" th:field="*{address}" required></textarea>
                            </div>
                        </div>
                        <div class="mt-4 d-flex gap-2">
                            <button class="btn btn-primary px-4" type="submit">Create Account</button>
                            <a class="btn btn-light" th:href="@{/login}">Back to Login</a>
                        </div>
                    </form>
                    <div th:if="${error}" class="alert alert-danger mt-3" th:text="${error}"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
