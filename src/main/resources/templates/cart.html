<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Cart')}"></head>
<body>
<div th:replace="~{fragments :: navbar}"></div>
<div th:replace="~{fragments :: alerts}"></div>

<div class="container py-4">
    <h1 class="h4 mb-3">Shopping Cart</h1>

    <div class="table-responsive">
        <table class="table table-bordered align-middle">
            <thead class="table-light">
            <tr>
                <th>Product</th>
                <th>Unit Price</th>
                <th>Quantity</th>
                <th>Total</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${summary.items}">
                <td th:text="${item.productName}"></td>
                <td>Rs. <span th:text="${#numbers.formatDecimal(item.unitPrice,1,2)}"></span></td>
                <td>
                    <form th:action="@{'/cart/update/' + ${item.productId}}" method="post" class="d-flex gap-2">
                        <input class="form-control" style="max-width:90px" type="number" min="1" name="quantity" th:value="${item.quantity}">
                        <button class="btn btn-sm btn-outline-primary">Update</button>
                    </form>
                </td>
                <td>Rs. <span th:text="${#numbers.formatDecimal(item.lineTotal,1,2)}"></span></td>
                <td>
                    <form method="post" th:action="@{'/cart/remove/' + ${item.productId}}">
                        <button class="btn btn-sm btn-outline-danger">Remove</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(summary.items)}"><td colspan="5" class="text-center text-muted">Cart is empty</td></tr>
            </tbody>
        </table>
    </div>

    <div class="row justify-content-end">
        <div class="col-md-5 col-lg-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="fw-bold mb-3">Cart Summary</h5>
                    <div class="d-flex justify-content-between"><span>Subtotal</span><span>Rs. <span th:text="${#numbers.formatDecimal(summary.subtotal,1,2)}"></span></span></div>
                    <div class="d-flex justify-content-between"><span>Discount</span><span>-Rs. <span th:text="${#numbers.formatDecimal(summary.discount,1,2)}"></span></span></div>
                    <div class="d-flex justify-content-between"><span>Delivery Fee</span><span>Rs. <span th:text="${#numbers.formatDecimal(summary.deliveryFee,1,2)}"></span></span></div>
                    <hr>
                    <div class="d-flex justify-content-between fw-bold"><span>Total</span><span>Rs. <span th:text="${#numbers.formatDecimal(summary.total,1,2)}"></span></span></div>

                    <div class="mt-3 d-grid gap-2">
                        <a class="btn btn-success" th:if="${isCustomer}" th:href="@{/orders/checkout}">Proceed to Checkout</a>
                        <a class="btn btn-outline-primary" th:href="@{/products/catalog}">Continue Shopping</a>
                        <form method="post" th:action="@{/cart/clear}">
                            <button class="btn btn-outline-danger w-100">Clear Cart</button>
                        </form>
                    </div>
                    <p class="small text-muted mt-2" th:if="${!isCustomer}">Login as customer to place an order.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
