<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title} + ' | Grocery System'">Grocery System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light sticky-top" th:fragment="navbar">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">FreshCart</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" th:href="@{/products/catalog}">Products</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/cart}">Cart</a></li>
                <li class="nav-item" th:if="${session.role == 'CUSTOMER'}"><a class="nav-link" th:href="@{/orders}">My Orders</a></li>
                <li class="nav-item" th:if="${session.role == 'CUSTOMER'}"><a class="nav-link" th:href="@{/customers/profile}">Profile</a></li>
                <li class="nav-item" th:if="${session.role == 'ADMIN'}"><a class="nav-link" th:href="@{/admin/dashboard}">Admin</a></li>
            </ul>
            <div class="d-flex gap-2">
                <span class="text-dark small align-self-center fw-medium" th:if="${session.username != null}">
                    Signed in as <strong th:text="${session.username}">user</strong>
                </span>
                <a class="btn btn-sm btn-primary" th:if="${session.userId == null}" th:href="@{/login}">Login</a>
                <a class="btn btn-sm btn-outline-dark" th:if="${session.userId == null}" th:href="@{/register}">Register</a>
                <a class="btn btn-sm btn-outline-danger" th:if="${session.userId != null}" th:href="@{/logout}">Logout</a>
            </div>
        </div>
    </div>
</nav>

<div class="container mt-3" th:fragment="alerts">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

<footer class="py-4 text-center text-muted small" th:fragment="footer">
    FreshCart - Online Grocery Ordering Management System
</footer>

<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script th:src="@{/js/app.js}"></script>
</div>
</body>
</html>
