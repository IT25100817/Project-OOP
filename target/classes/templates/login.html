<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Login')}"></head>
<body>
<div th:replace="~{fragments :: navbar}"></div>
<div th:replace="~{fragments :: alerts}"></div>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5 fade-in-up">
            <div class="card p-2">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <h1 class="h3 fw-bold mb-1">Welcome Back</h1>
                        <p class="text-muted small">Enter your credentials to access your account.</p>
                    </div>
                    <form method="post" th:action="@{/login}">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button class="btn btn-primary w-100 py-2 mt-2" type="submit">Sign In</button>
                    </form>
                    <p class="small mt-4 text-center mb-0">Don't have an account? <a th:href="@{/register}" class="fw-semibold text-decoration-none">Register here</a></p>
                </div>
            </div>
            <div class="alert alert-info mt-3 small">
                Default admin: <strong>admin</strong> / <strong>admin123</strong>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
